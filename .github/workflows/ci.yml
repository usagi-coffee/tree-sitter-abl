name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    if: >
      !startsWith(github.event.head_commit.message, 'meta:')
      && !startsWith(github.event.head_commit.message, 'agent:')
      && !startsWith(github.event.head_commit.message, 'tools:')
    strategy:
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Git LFS pull
        run: git lfs pull

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build native
        run: bun run build

      - name: Test
        run: bun run test

      - name: Benchmark
        run: bun run benchmark
